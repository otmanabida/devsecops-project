name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:
    # -------------------------
    # 1️⃣ Checkout code
    # -------------------------
    - name: Checkout repository
      uses: actions/checkout@v3

    # -------------------------
    # 2️⃣ Setup Python
    # -------------------------
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # -------------------------
    # 3️⃣ Install dependencies
    # -------------------------
    - name: Install Python dependencies
      run: pip install --no-cache-dir -r requirements.txt

    # -------------------------
    # 4️⃣ Run tests with pytest
    # -------------------------
    - name: Run pytest
      run: pytest

    # -------------------------
    # 5️⃣ SAST scan with Bandit
    # -------------------------
    - name: Install Bandit
      run: pip install bandit jq

    - name: Run Bandit
      run: |
        bandit -r . -ll -f json -o bandit-report.json
        MEDIUM=$(jq '[.results[] | select(.issue_severity=="MEDIUM" or .issue_severity=="HIGH")] | length' bandit-report.json)
        if [ "$MEDIUM" -gt 0 ]; then
          echo "⚠️ Bandit found $MEDIUM Medium/High issues."
          exit 1
        else
          echo "✅ No Medium/High issues found by Bandit."
        fi

    # -------------------------
    # 6️⃣ Secret scanning with Gitleaks
    # -------------------------
    - name: Run Gitleaks
      uses: zricethezav/gitleaks-action@v2

    # -------------------------
    # 7️⃣ Build Docker image
    # -------------------------
    - name: Build Docker image
      run: docker build -t devsecops-app .

    # -------------------------
    # 8️⃣ Scan Docker image with Trivy
    # -------------------------
    - name: Scan Docker image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'devsecops-app'
        format: 'table'
        exit-code: 1  # Fails job only on High/Critical vulnerabilities
